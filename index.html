<!DOCTYPE html>
<!--
  GitHub Pages の固定入口（ランチャー）。
  Pages を有効化すると <user>.github.io/StarBattle/ がここを開く。
  実体（アプリ）が tools/ 内で移動しても、このファイルのリンク先を直すだけで
  入口URLは不変に保てる。外部依存なし・自己完結。
-->
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarBattle ツール</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; color: #222; background: #fafafa; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 28px 18px; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  p.lead { color: #555; margin-top: 0; }
  .card { display: block; background: #fff; border: 1px solid #e2e2e2; border-radius: 10px;
    padding: 16px 18px; margin: 14px 0; text-decoration: none; color: inherit;
    box-shadow: 0 1px 2px rgba(0,0,0,.04); }
  .card:hover { border-color: #b9c7ff; box-shadow: 0 2px 8px rgba(60,90,200,.10); }
  .card h2 { font-size: 1.1rem; margin: 0 0 4px; }
  .card .go { color: #2b50d8; font-weight: 700; }
  .card .desc { color: #555; font-size: .92rem; }
  footer { color: #888; font-size: .82rem; margin-top: 22px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>StarBattle ツール</h1>
  <p class="lead">スターバトル（星置きパズル）の調査・確認用ツール置き場。</p>

  <a class="card" href="board_play.html">
    <h2>盤面チェックで遊ぶ <span class="go">▶ 開く</span></h2>
    <p class="desc">領域グリッドを読み込み、クリック/タップで 空→×→★→空 に循環。
      フォーシング等で確定した状態をロックして読み込み、続きから確認。軽い「解けた」判定つき。</p>
  </a>

  <footer>
    URL を知っていれば誰でも開けます（ログイン不要・静的アプリ）。<br>
    ソース: <code>board_play.html</code>（依存ゼロの自己完結 HTML）。
  </footer>
</div>
</body>
</html>
